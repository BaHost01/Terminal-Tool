name: Build Mobile App (Android)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'mobileapp/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      - name: Build Android Debug APK
        working-directory: mobileapp
        run: gradle assembleDebug --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terminal-tool-debug-apk
          path: mobileapp/app/build/outputs/apk/debug/app-debug.apk
