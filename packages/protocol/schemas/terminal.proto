syntax = "proto3";

package terminal;

// Client -> Server messages
message ClientMessage {
  oneof payload {
    AuthRequest auth_request = 1;
    RegisterHostRequest register_host = 2;
    PtyInput pty_input = 3;
    PtyResize pty_resize = 4;
    ToggleScreenRequest toggle_screen = 5;
    ToggleAdminRequest toggle_admin = 6;
  }
  string client_id = 10; 
}

// Server -> Client/Host messages
message ServerMessage {
  oneof payload {
    AuthResponse auth_response = 1;
    RegisterHostResponse register_host_response = 2;
    PtyOutput pty_output = 3;
    PtyExit pty_exit = 4;
    SystemMessage system_message = 5;
    ErrorMessage error_message = 6;
    ScreenFrame screen_frame = 7;
  }
}

// Host -> Server messages
message HostMessage {
  oneof payload {
    AuthRequest auth_request = 1;
    RegisterHostRequest register_host = 2;
    PtyOutput pty_output = 3;
    PtyExit pty_exit = 4;
    ScreenFrame screen_frame = 5;
    HostCapabilities capabilities = 6;
  }
}

message AuthRequest {
  string host_id = 1;
  string token = 2;
}

message AuthResponse {
  bool ok = 1;
  string error = 2;
}

message RegisterHostRequest {
  string host_id = 1;
  string password = 2;
  bool run_as_admin = 3;
}

message RegisterHostResponse {
  bool ok = 1;
  string token = 2;
  string error = 3;
  bool is_admin = 4;
}

message PtyInput {
  string data = 1;
}

message PtyResize {
  uint32 cols = 1;
  uint32 rows = 2;
}

message PtyOutput {
  string data = 1;
  string client_id = 2;
}

message PtyExit {
  int32 code = 1;
  string client_id = 2;
}

message SystemMessage {
  string message = 1;
}

message ErrorMessage {
  string message = 1;
}

message ScreenFrame {
  bytes data = 1; // JPEG or PNG data
  uint32 width = 2;
  uint32 height = 3;
}

message ToggleScreenRequest {
  bool enabled = 1;
}

message ToggleAdminRequest {
  bool enabled = 1;
}

message HostCapabilities {
  bool supports_screen_share = 1;
  bool supports_admin_mode = 2;
  bool is_admin = 3;
}
